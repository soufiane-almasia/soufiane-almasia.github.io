<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Crossword: Trivia &amp; Pics</title>
  <meta name="description" content="Daily Crossword: Trivia & Pics — a picture-and-trivia crossword game. Privacy policy and support." />
  <style>
    :root { --teal:#006767; --teal-dark:#004d4d; --ink:#10302f; --muted:#5b6f6e; --bg:#f4f8f8; --card:#ffffff; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--bg); line-height: 1.6;
    }
    header {
      background: linear-gradient(160deg, var(--teal), var(--teal-dark));
      color: #fff; padding: 64px 24px 56px; text-align: center;
    }
    header h1 { margin: 0 0 10px; font-size: 2rem; letter-spacing: -.01em; }
    header p { margin: 0; opacity: .9; }
    main { max-width: 640px; margin: 0 auto; padding: 40px 24px 64px; }
    .links { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    a.btn {
      display: inline-block; text-decoration: none; color: #fff;
      background: var(--teal); padding: 12px 22px; border-radius: 10px;
      font-weight: 600;
    }
    a.btn:hover { background: var(--teal-dark); }
    footer { text-align: center; color: var(--muted); font-size: .85rem; padding: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Daily Crossword: Trivia &amp; Pics</h1>
    <p>A picture-and-trivia crossword game.</p>
  </header>
  <main>
    <div class="links">
      <a class="btn" href="/privacy.html">Privacy Policy</a>
      <a class="btn" href="/support.html">Support</a>
    </div>
  </main>
  <footer>&copy; Daily Crossword: Trivia &amp; Pics</footer>
</body>
</html>
