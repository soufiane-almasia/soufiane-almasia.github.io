<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vona: AI Voice Journal</title>
  <meta name="description" content="Vona: AI Voice Journal — speak your day, get a beautiful journal entry. Privacy policy and support." />
  <style>
    :root { --accent:#C1694B; --accent-dark:#A5502F; --ink:#2E241C; --muted:#6B5C4D; --bg:#F3E7D3; --card:#FFFCF6; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink); background: var(--bg); line-height: 1.6;
    }
    header {
      background: linear-gradient(160deg, #E0895E, var(--accent-dark));
      color: #fff; padding: 64px 24px 56px; text-align: center;
    }
    header h1 { margin: 0 0 10px; font-size: 2rem; letter-spacing: -.01em; }
    header p { margin: 0; opacity: .9; }
    main { max-width: 640px; margin: 0 auto; padding: 40px 24px 64px; }
    .links { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    a.btn {
      display: inline-block; text-decoration: none; color: #fff;
      background: var(--accent); padding: 12px 22px; border-radius: 10px;
      font-weight: 600;
    }
    a.btn:hover { background: var(--accent-dark); }
    footer { text-align: center; color: var(--muted); font-size: .85rem; padding: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Vona: AI Voice Journal</h1>
    <p>Tap the mic and talk — your day, written for you.</p>
  </header>
  <main>
    <div class="links">
      <a class="btn" href="/vona/privacy.html">Privacy Policy</a>
      <a class="btn" href="/vona/support.html">Support</a>
    </div>
  </main>
  <footer>&copy; 2026 Soufiane Chalouh &middot; Vona</footer>
</body>
</html>
